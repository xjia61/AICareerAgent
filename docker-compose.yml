services:
  db:
    image: postgres:16
    container_name: ai_career_agent_db
    restart: always
    environment:
      POSTGRES_USER: career_user
      POSTGRES_PASSWORD: career_password
      POSTGRES_DB: career_agent
    ports:
      - "5432:5432"
    volumes:
      - career_agent_pgdata:/var/lib/postgresql/data

volumes:
  career_agent_pgdata: